<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exchange Rate Test</title>
</head>
<body>
    <h1>Exchange Rate Debug Test</h1>
    <div id="results"></div>
    
    <script>
        const resultsDiv = document.getElementById('results');
        
        function log(message) {
            console.log(message);
            resultsDiv.innerHTML += '<p>' + message + '</p>';
        }
        
        log('🧪 Testing Exchange Rate Service...');
        
        // Test 1: Direct API call
        fetch('/api/exchange-rate')
            .then(response => response.json())
            .then(data => {
                log('✅ API Response: ' + JSON.stringify(data));
                log('📊 Rate from API: ' + data.exchange_rate);
                
                // Test 2: Calculate expected prices
                const blackKaftanUSD = 95;
                const greyAgbadaUSD = 350;
                const expectedBlack = blackKaftanUSD * data.exchange_rate;
                const expectedGrey = greyAgbadaUSD * data.exchange_rate;
                
                log('🔍 Expected prices with rate ' + data.exchange_rate + ':');
                log('   Black Kaftan: $' + blackKaftanUSD + ' → ₵' + expectedBlack);
                log('   Grey Agbada: $' + greyAgbadaUSD + ' → ₵' + expectedGrey);
                
                // Test 3: Check if this matches what we see on shop page
                log('');
                log('🎯 If shop page shows different prices, the frontend is not using this rate!');
                
            })
            .catch(error => {
                log('❌ API Error: ' + error.message);
            });
    </script>
</body>
</html>
