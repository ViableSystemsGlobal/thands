<!DOCTYPE html>
<html>
<head>
    <title>Simple Admin Test</title>
</head>
<body>
    <h1>Simple Admin Test</h1>
    <button onclick="testAPI()">Test API Directly</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = 'Testing...';
            
            try {
                // First, login as admin
                console.log('Logging in as admin...');
                const loginResponse = await fetch('http://localhost:3001/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'admin@tailoredhands.com',
                        password: 'admin123'
                    })
                });
                
                const loginData = await loginResponse.json();
                console.log('Login result:', loginData);
                
                if (loginData.token) {
                    // Test products API
                    console.log('Testing products API...');
                    const productsResponse = await fetch('http://localhost:3001/api/products?page=1&limit=10&active=all', {
                        headers: {
                            'Authorization': `Bearer ${loginData.token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const productsData = await productsResponse.json();
                    console.log('Products result:', productsData);
                    
                    // Test metrics API
                    console.log('Testing metrics API...');
                    const metricsResponse = await fetch('http://localhost:3001/api/products/metrics', {
                        headers: {
                            'Authorization': `Bearer ${loginData.token}`,
                            'Content-Type': 'application/json'
                        }
                    });
                    
                    const metricsData = await metricsResponse.json();
                    console.log('Metrics result:', metricsData);
                    
                    resultDiv.innerHTML = `
                        <h2>Results:</h2>
                        <p><strong>Products found:</strong> ${productsData.products?.length || 0}</p>
                        <p><strong>Total products:</strong> ${productsData.pagination?.total || 0}</p>
                        <p><strong>Average price:</strong> $${metricsData.averagePrice || 0}</p>
                        <p><strong>Active products:</strong> ${metricsData.activeProducts || 0}</p>
                        <h3>First Product:</h3>
                        <pre>${JSON.stringify(productsData.products?.[0] || 'No products', null, 2)}</pre>
                    `;
                } else {
                    resultDiv.innerHTML = `<p style="color: red;">Login failed: ${loginData.error}</p>`;
                }
            } catch (error) {
                console.error('Test error:', error);
                resultDiv.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        }
    </script>
</body>
</html>
