databases:
  - name: tailoredhands-db
    plan: basic-256mb
    databaseName: tailoredhands
    user: tailoredhands

services:
  # ── Backend API ──────────────────────────────────────────────────────────────
  - type: web
    name: tailoredhands-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: starter
    disk:
      name: uploads
      mountPath: /opt/render/project/src/uploads
      sizeGB: 10
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tailoredhands-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://tailoredhands.africa
      - key: ALLOWED_ORIGINS
        value: https://tailoredhands.africa,https://www.tailoredhands.africa
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: UPLOAD_PATH
        value: /opt/render/project/src
      # DHL — production endpoint + credentials set in Render dashboard
      - key: MYDHL_BASE_URL
        value: https://express.api.dhl.com/mydhlapi
      - key: MYDHL_USERNAME
        sync: false
      - key: MYDHL_PASSWORD
        sync: false
      - key: MYDHL_ACCOUNT_NUMBER
        sync: false
      # Other secrets — set in Render dashboard
      - key: OPENAI_API_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────────
  - type: web
    name: tailoredhands
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://tailoredhands-api.onrender.com/api
      - key: VITE_PAYSTACK_PUBLIC_KEY
        sync: false
      - key: VITE_SUPABASE_URL
        value: https://fqnzrffsscrhknfzewxd.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_RECAPTCHA_SITE_KEY
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
